<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Connect</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(to right, #000000cc, #000000cc),
                url('gdb4.jpeg') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    letter-spacing: 2px;
}

.hero p {
    color: #ccc;
    margin-top: 10px;
}

/* GALLERY */
.gallery {
    padding: 50px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.07);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: #888;
}
</style>
</head>

<body>

<section class="hero">
    <div>
        <h1>NS CONNECT</h1>
        <p>Building Sports • Community • Opportunities</p>
    </div>
</section>

<section class="gallery">
    <img src="gdb4.jpeg">
    <img src="gdp6.jpeg">
    <img src="ccw.jpeg">
    <img src="jsc s2.jpeg">
    <img src="jsc1.jpeg">
    <img src="tlk.jpeg">
    <img src="pk2.jpeg">
    <img src="pk1.jpeg">
    <img src="fc.jpeg">
    <img src="fc2.jpeg">
</section>

<footer>
    © 2026 NS Connect
</footer>

</body>
</html>
