
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Connect</title>

<link  rel="icon"  href="ccw.jpeg">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #000;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    color: #aaa;
    margin-top: 10px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
}

/* SECTION */
section {
    padding: 40px 20px;
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

/* FOOTER */
footer {
    padding: 20px;
    text-align: center;
    background: #111;
    color: #888;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>NS CONNECT</h1>
        <p>Building Sports • Community • Opportunities</p>
    </div>
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="gdb4.jpeg">
    <img src="gdp6.jpeg">
    <img src="ccw.jpeg">
    <img src="jscs2.jpeg">
    <img src="jsc1.jpeg">
    <img src="tlk.jpeg">
    <img src="pk1.jpeg">
    <img src="pk2.jpeg">
    <img src="fc.jpeg">
    <img src="fc2.jpeg">
</div>

<!-- ABOUT -->
<section>
    <h2>About NS Connect</h2>
    <p>NS Connect is building a structured sports ecosystem across Nagaland.</p>
</section>

<!-- FOOTER -->
<footer>
    © 2026 NS Connect
</footer>

</body>
</html>
